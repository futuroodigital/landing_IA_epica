<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diplomado IA - Versión A</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', serif;
      background-image: url('https://i.ibb.co/gwZQ4Jp/bg-landing-ia.png'); /* FONDO IMPACTANTE */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: #f1e7c8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    .formulario {
      width: 100%;
      max-width: 600px;
      background: rgba(0, 0, 0, 0.65);
      padding: 2rem;
      border-radius: 20px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.35);
    }

    .formulario input[type="email"] {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      margin-bottom: 1rem;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      font-family: 'Inter', sans-serif;
    }

    .formulario button {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: bold;
      background: linear-gradient(90deg, #ffd700, #d4af37);
      border: none;
      border-radius: 12px;
      color: black;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 0 24px #d4af37;
      transition: transform 0.2s ease;
    }

    .formulario button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 32px #fbc02d;
    }

    @media screen and (max-width: 768px) {
      body {
        background-attachment: scroll;
        background-size: cover;
      }
    }
  </style>
</head>
<body>
  <div class="formulario">
    <h1>Conviértete en el profesional que domina la Inteligencia Artificial aplicada.</h1>
    <p>120 horas en vivo · Proyecto real · Coach con experiencia empresarial</p>
    <p>Accede al futuro sin maestrías costosas ni caminos eternos.</p>
    <form action="https://script.google.com/macros/s/AKfycbxkHPslqo4gNSUsubGTdYbGJwD0pYVt3RM9YnSkEaNONBLKgiK4dr1qlt80V6csBeGZ/exec" method="POST">
      <input type="email" name="email" placeholder="Tu correo electrónico" required />
      <button type="submit">Quiero aplicar al Diplomado</button>
    </form>
  </div>
</body>
</html>
