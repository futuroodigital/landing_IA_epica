<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diplomado IA | Futuro Digital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    body {
      background: black;
      position: relative;
    }

    .background {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('fondo_epico.png') center center / cover no-repeat;
      animation: parallax 10s ease-in-out infinite alternate;
    }

    .overlay::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.2) 50%, transparent 100%);
      animation: shimmer 5s linear infinite;
      z-index: 1;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes parallax {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.02) translateY(-1%); }
    }

    .overlay {
      position: relative;
      z-index: 2;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 30px;
      color: white;
      text-align: center;
    }

    .logo {
      position: absolute;
      top: 30px;
      width: 160px;
      z-index: 3;
    }

    .spacer {
      height: 160px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 12px;
      margin-top: 40px;
    }

    input[type="email"] {
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 280px;
      font-size: 16px;
    }

    button {
      background-color: gold;
      color: black;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #f5c842;
    }

    @media (max-width: 600px) {
      .logo {
        width: 120px;
      }
      input[type="email"] {
        width: 220px;
        font-size: 14px;
      }
      button {
        font-size: 14px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay">
    <img src="futuro_digital_logo_correcto.png" alt="Futuro Digital" class="logo">
    <div class="spacer"></div>
    <form action="https://script.google.com/macros/s/AKfycbxkHPslqo4gNSUsubGTdYbGJwD0pYVt3RM9YnSkEaNONBLKgiK4dr1qlt80V6csBeGZ/exec" method="POST">
      <input type="email" name="email" placeholder="Tu correo electrónico" required>
      <button type="submit">Inscribirme</button>
    </form>
  </div>
</body>
</html>
