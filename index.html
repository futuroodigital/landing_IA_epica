<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diplomado IA | Futuro Digital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      position: relative;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }
    .logo {
      width: 150px;
      margin-top: 20px;
    }
    .form-container {
      margin-top: auto;
      text-align: center;
    }
    form {
      margin-top: 20px;
    }
    input[type="email"] {
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 280px;
      font-size: 16px;
    }
    button {
      background-color: gold;
      color: black;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      margin-left: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #f5c842;
    }
    .fechas {
      font-size: 14px;
      margin-top: 25px;
      color: #ffd700;
    }
    @media (max-width: 600px) {
      .logo {
        width: 120px;
      }
      input[type="email"] {
        width: 200px;
        font-size: 14px;
      }
      button {
        padding: 10px 18px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <img src="futuro_digital_logo_correcto.png" alt="Futuro Digital" class="logo">
    <div class="form-container">
      <form action="https://script.google.com/macros/s/AKfycbxkHPslqo4gNSUsubGTdYbGJwD0pYVt3RM9YnSkEaNONBLKgiK4dr1qlt80V6csBeGZ/exec" method="POST">
        <input type="email" name="email" placeholder="Tu correo electrónico" required>
        <button type="submit">Inscribirme</button>
      </form>
      <p class="fechas">
        Evento introductorio: 4 de septiembre<br>
        Inicio del diplomado: 22 de septiembre
      </p>
    </div>
  </div>
</body>
</html>
